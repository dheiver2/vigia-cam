name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Versão do Swift
        run: swift --version

      - name: Compilar (release)
        working-directory: VigiaCam
        run: swift build -c release
